function resetSiteBaseline(index) {
  sites[index].prevHash = null;
  sites[index].prevText = null;
  sites[index].snippet = null;
  sites[index].snippetDiff = null;
  sites[index].status = 'unchecked';
  delete proxyCache[sites[index].url];
  saveProxyCache();
}

function bindSelectorInput(container) {
  const input = container.querySelector('.selector-input');
  if (!input) return;
  const save = () => {
    const idx = parseInt(input.dataset.index);
    if (!sites[idx]) return;
    const newVal = input.value.trim();
    if (newVal === (sites[idx].selector || '')) return;
    const previous = { ...sites[idx] };
    sites[idx].selector = newVal;
    // セレクタが変わったらベースラインをリセット（次回確認時に再取得）
    resetSiteBaseline(idx);
    touchSite(idx);
    if (!saveSites()) {
      sites[idx] = previous;
      input.value = previous.selector || '';
      return;
    }
    renderList();
    setStatus(newVal ? `監視範囲を "${newVal}" に設定しました（次回確認時に反映）` : '監視範囲をページ全体にリセットしました');
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
}

function bindNoiseRuleInputs(container) {
  const bind = (selector, field, label) => {
    const input = container.querySelector(selector);
    if (!input) return;
    const save = () => {
      const idx = parseInt(input.dataset.index);
      if (!sites[idx]) return;
      const newVal = input.value.trim();
      if (newVal === (sites[idx][field] || '')) return;
      const previous = { ...sites[idx] };
      sites[idx][field] = newVal;
      resetSiteBaseline(idx);
      touchSite(idx);
      if (!saveSites()) {
        sites[idx] = previous;
        input.value = previous[field] || '';
        return;
      }
      renderList();
      setStatus(newVal ? `${label}を設定しました（次回確認時に反映）` : `${label}を解除しました`);
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
  };
  bind('.ignore-selector-input', 'ignoreSelector', '除外要素');
  bind('.ignore-text-input', 'ignoreTextPattern', '除外文字');
}

function bindTagsInput(container) {
  const input = container.querySelector('.tags-input');
  if (!input) return;
  const save = () => {
    const idx = parseInt(input.dataset.index);
    if (!sites[idx]) return;
    const newTags = input.value.split(',').map(t => t.trim()).filter(Boolean);
    if (JSON.stringify(sites[idx].tags || []) === JSON.stringify(newTags)) return;
    const previous = sites[idx].tags || [];
    const previousUpdatedAt = sites[idx].updatedAt;
    sites[idx].tags = newTags;
    touchSite(idx);
    if (!saveSites()) {
      sites[idx].tags = previous;
      sites[idx].updatedAt = previousUpdatedAt;
      input.value = previous.join(', ');
      return;
    }
    renderTagFilterBar();
    renderList();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
}

  ignoreText: `差分検出から除外するテキストを正規表現で指定します。アクセスカウンターや日時など頻繁に変わるがチェック不要なテキストを除外できます。<br><br>例:<br><code>閲覧数:\\s*\\d+</code> — 閲覧数カウンター<br><code>\\d+件のコメント</code> — コメント数<br><code>\\d{4}/\\d{2}/\\d{2}</code> — 日付表示`,
};

function toggleHelpTooltip(icon) {
  const existing = document.querySelector('.help-tooltip');
  if (existing) {
    const wasThisIcon = existing._icon === icon;
    existing.remove();
    if (wasThisIcon) return;
  }
  const key = icon.dataset.help;
  const text = HELP_TEXTS[key];
  if (!text) return;
  const tooltip = document.createElement('div');
  tooltip.className = 'help-tooltip';
  tooltip._icon = icon;
  tooltip.innerHTML = text;
  document.body.appendChild(tooltip);
  const rect = icon.getBoundingClientRect();
  tooltip.style.top = (rect.bottom + 4) + 'px';
  tooltip.style.left = Math.max(4, rect.left - 10) + 'px';
  const closeHandler = (e) => {
    if (!tooltip.contains(e.target) && e.target !== icon) {
      tooltip.remove();
      document.removeEventListener('click', closeHandler, true);
    }
  };
  setTimeout(() => document.addEventListener('click', closeHandler, true), 0);
}

function bindHelpIcons(container) {
  container.querySelectorAll('.help-icon').forEach(icon => {
    icon.addEventListener('click', e => { e.stopPropagation(); toggleHelpTooltip(icon); });
  });
}

const SELECTOR_PRESETS = {
  selector: ['main', '#main', 'article', '#content', '.post-content', '.entry-content', '.main-content', '.article-body'],
  ignoreSelector: ['.ad, .ads, .advertisement', '.sidebar', '.comment, .comments', 'time, .date', '.share, .social', '.related-posts'],

};

let _presetDropdown = null;

function hidePresetDropdown() {
  if (_presetDropdown) { _presetDropdown.remove(); _presetDropdown = null; }
}

function showPresetDropdown(input, presets) {
  hidePresetDropdown();
  const dropdown = document.createElement('div');
  dropdown.className = 'selector-preset-dropdown';
  presets.forEach(p => {
    const item = document.createElement('div');
    item.className = 'preset-item';
    item.textContent = p;
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      input.value = p;
      input.dispatchEvent(new Event('blur'));
      hidePresetDropdown();
    });
    dropdown.appendChild(item);
  });
  const wrap = input.closest('.preset-wrap');
  (wrap || input.parentElement).appendChild(dropdown);
  _presetDropdown = dropdown;
}

function bindPresetDropdowns(container) {
  const bind = (selector, presetKey) => {
    const input = container.querySelector(selector);
    if (!input) return;
    input.addEventListener('focus', () => { if (!input.value) showPresetDropdown(input, SELECTOR_PRESETS[presetKey]); });
    input.addEventListener('input', () => { if (!input.value) showPresetDropdown(input, SELECTOR_PRESETS[presetKey]); else hidePresetDropdown(); });
    input.addEventListener('blur', () => { setTimeout(hidePresetDropdown, 150); });
    input.addEventListener('keydown', e => { if (e.key === 'Escape') hidePresetDropdown(); });
  };
  bind('.selector-input', 'selector');
  bind('.ignore-selector-input', 'ignoreSelector');
  bind('.ignore-text-input', 'ignoreText');
}

function bindMonitorTestBtn(container) {
  const btn = container.querySelector('.monitor-test-btn');
  if (!btn) return;
  const resultEl = container.querySelector('.monitor-test-result');
  btn.addEventListener('click', async () => {
    const idx = parseInt(btn.dataset.index);
    const site = sites[idx];
    if (!site) return;
    const selector = (container.querySelector('.selector-input')?.value || '').trim();
    const ignoreSelector = (container.querySelector('.ignore-selector-input')?.value || '').trim();
    const ignoreTextPattern = (container.querySelector('.ignore-text-input')?.value || '').trim();
    btn.disabled = true;
    btn.textContent = 'テスト中...';
    resultEl.className = 'monitor-test-result';
    resultEl.style.display = 'block';
    resultEl.textContent = '取得中...';
    try {
      const html = await fetchPage(site.url);
      let selectorMatched = true;
      if (selector) {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        try { selectorMatched = !!doc.querySelector(selector); } catch { selectorMatched = false; }
      }
      const { text } = extractPageContent(html, selector, ignoreSelector, ignoreTextPattern);
      const preview = text.slice(0, 500);
      if (!selectorMatched) {
        resultEl.className = 'monitor-test-result warn';
        resultEl.textContent = `⚠ セレクタ "${selector}" に一致する要素がありませんでした（ページ全体にフォールバック）\n\n${preview}${text.length > 500 ? '…' : ''}`;
      } else {
        resultEl.className = 'monitor-test-result';
        resultEl.textContent = `✓ 抽出テキスト（先頭500文字）\n\n${preview}${text.length > 500 ? '…' : ''}`;
      }
    } catch (e) {
      resultEl.className = 'monitor-test-result error';
      resultEl.textContent = `✗ 取得エラー: ${e.message}`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'テスト';
    }
  });
}

// ============================================================
// Add site
// ============================================================
async function addSite(inputUrl) {
  let url = inputUrl.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  url = sanitizeHttpUrl(url);
  if (!url) {
    setStatus('URLが正しくありません');
    return;
  }

  if (sites.some(s => s.url === url)) {
    setStatus('すでに登録されています: ' + url);
    return;
  }

  const site = {
    url,
    label: '',
    selector: '',
    ignoreSelector: '',
    ignoreTextPattern: '',
    tags: [],
    pinned: false,
    addedAt: new Date(),
    lastCheckedAt: null,
    lastChangedAt: null,
    prevText: null,
    prevHash: null,
    snippet: null,
    snippetDiff: null,
    status: 'unchecked',
    errorMsg: null,
    updatedAt: new Date(),
  };
  const previous = [...sites];
  sites.push(site);
  if (!saveSites()) {
    sites = previous;
    return;
  }
  const newIndex = sites.length - 1;
  selectedIndex = newIndex;
  renderList();
  showDetail();
  setStatus(`追加しました: ${url}`);

  await checkSite(newIndex);
}

// ============================================================
// Check single site
// ============================================================
async function checkSite(index) {
  const site = sites[index];
  if (!site) return;
  if (site._checking) return site._checkPromise || Promise.resolve();

  site._checking = true;
  site.status = 'checking';
  renderList();
  if (selectedIndex === index) showDetail();

  site._checkPromise = (async () => {
    try {
      let _timeoutId = null;
      const html = await Promise.race([
        fetchPage(site.url),
        new Promise((_, reject) => {
          _timeoutId = setTimeout(() => reject(new Error('タイムアウト')), 30000);
        }),
      ]).finally(() => clearTimeout(_timeoutId));
      const { title, text } = extractPageContent(
        html,
        site.selector || '',
        site.ignoreSelector || '',
        site.ignoreTextPattern || ''
      );

      if (title && !site.label) site.label = title;
      site.lastCheckedAt = new Date();

      const hash = await computeHash(text);

      if (site.prevHash && site.prevHash !== hash) {
        // Changed
        site.snippet = findSnippet(text, site.prevText);
        site.snippetDiff = buildDiffSnippet(text, site.prevText);
        site.lastChangedAt = new Date();
      }
      site.status = 'ok';

      site.prevHash = hash;
      site.prevText = text;
      site.errorMsg = null;
      site.updatedAt = new Date();
      return { ok: true, url: site.url };
    } catch (e) {
      site.status = 'error';
      site.errorMsg = e.message;
      site.lastCheckedAt = new Date();
      site.updatedAt = new Date();
      return { ok: false, url: site.url, error: e };
    } finally {
      site._checking = false;
      saveSites();
      renderList();
      if (selectedIndex === index) showDetail();
      delete site._checkPromise;
    }
  })();

  return site._checkPromise;
}

// ============================================================
// Check all
// ============================================================
let checkAllRunning = false;

async function checkAll() {
  if (checkAllRunning) return;
  if (sites.length === 0) { setStatus('サイトが登録されていません'); return; }

  checkAllRunning = true;
  const spinner = document.getElementById('loading-spinner');
  const addBtn = document.getElementById('add-btn');
  spinner.style.display = 'inline-block';
  addBtn.disabled = true;

  const total = sites.length;
  let completed = 0;
  const failures = [];

  showCheckLoader(total);

  const queue = [...sites]; // インデックスではなくオブジェクト参照で保持（実行中の削除でずれない）
  const CONCURRENCY = 3;

  const worker = async () => {
    while (queue.length > 0) {
      const site = queue.shift();
      const idx = sites.indexOf(site);
      if (idx !== -1) {
        const result = await checkSite(idx); // 実行中に削除されたサイトはスキップ
        if (result && !result.ok) failures.push(result);
      }
      completed++;
      updateCheckLoader(completed, total);
    }
  };

  try {
    await Promise.all(Array.from({ length: CONCURRENCY }, worker));
  } finally {
    spinner.style.display = 'none';
    hideCheckLoader();
    if (failures.length > 0) {
      const failedNames = failures.slice(0, 3).map(f => getSiteLabelByUrl(f.url)).join('、');
      const suffix = failures.length > 3 ? ` ほか${failures.length - 3}件` : '';
      setStatus(`確認完了。一部失敗: ${failedNames}${suffix}`);
    } else {
      setStatus(`確認完了 — ${new Date().toLocaleTimeString()}`);
    }
    checkAllRunning = false;
    addBtn.disabled = false;
  }
}

// ============================================================
// Toggle pin
// ============================================================
function togglePin(index) {
  if (index < 0 || index >= sites.length) return;
  const previous = sites[index].pinned;
  const previousUpdatedAt = sites[index].updatedAt;
  sites[index].pinned = !sites[index].pinned;
  touchSite(index);
  if (!saveSites()) {
    sites[index].pinned = previous;
    sites[index].updatedAt = previousUpdatedAt;
    return;
  }
  renderList();
  // タイルオーバーレイが同じサイトを表示中なら即座に反映
  const overlayPinBtn = document.getElementById('tile-overlay-pin-btn');
  if (overlayPinBtn && parseInt(overlayPinBtn.dataset.index) === index) {
    const pinned = sites[index].pinned;
    overlayPinBtn.classList.toggle('pinned', pinned);
    overlayPinBtn.dataset.tooltip = pinned ? 'ピンを外す' : 'ピンを立てる';
    overlayPinBtn.setAttribute('aria-label', pinned ? 'ピンを外す' : 'ピンを立てる');
  }
}

// ============================================================
// Delete site
// ============================================================
function deleteSite(index) {
  if (index < 0 || index >= sites.length) return;
  const url = sites[index].url;
  if (!confirm(`「${sites[index].label || url}」を削除しますか？`)) return;
  const removed = sites[index];
  const cachedProxy = proxyCache[url];
  sites.splice(index, 1);
  delete imageCache[url];
  delete proxyCache[url];
  saveProxyCache();
  if (!saveSites()) {
    sites.splice(index, 0, removed);
    if (cachedProxy) proxyCache[url] = cachedProxy;
    saveProxyCache();
    return;
  }
  selectedIndex = -1;
  closeMobileDetail();
  renderList();
  showDetail();
  setStatus('削除しました');
}

// Export / Import
// ============================================================
function exportSites() {
  const data = JSON.stringify(sites.map(s => ({
    url: s.url,
    label: s.label,
    selector: s.selector || '',
    ignoreSelector: s.ignoreSelector || '',
    ignoreTextPattern: s.ignoreTextPattern || '',
    tags: s.tags || [],
    pinned: s.pinned === true,
  })), null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url;
  a.download = 'antenna-sites.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('エクスポートしました');
}

function importSites(file) {
  const reader = new FileReader();
  reader.onerror = () => setStatus('ファイルを読み込めませんでした');
  reader.onabort = () => setStatus('ファイルの読み込みがキャンセルされました');
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('invalid format');
      let added = 0;
      const previous = [...sites];
      data.forEach(item => {
        if (item == null) return;
        const rawUrl = typeof item === 'string' ? item : item.url;
        const url = sanitizeHttpUrl(String(rawUrl ?? '').trim());
        if (!url || sites.some(s => s.url === url)) return;
        const normalized = normalizeSite({
          url,
          label: item.label,
          selector: item.selector,
          ignoreSelector: item.ignoreSelector,
          ignoreTextPattern: item.ignoreTextPattern,
          tags: item.tags,
          pinned: item.pinned,
          addedAt: new Date(),
          lastCheckedAt: null,
          lastChangedAt: null,
          prevText: null,
          prevHash: null,
          snippet: null,
          status: 'unchecked',
          errorMsg: null,
          updatedAt: new Date(),
        });
        if (!normalized) return;
        sites.push(normalized);
        added++;
      });
      if (!saveSites()) {
        sites = previous;
        return;
      }
      renderList();
      setStatus(`${added}件を追加しました`);
    } catch {
      setStatus('インポートに失敗しました（形式が不正です）');
    }
  };
  reader.readAsText(file);
}

document.getElementById('settings-btn').addEventListener('click', () => {

document.getElementById('settings-save-btn').addEventListener('click', () => {

document.getElementById('cloud-sync-now-btn').addEventListener('click', async () => {
  saveCloudConfig({
    url: document.getElementById('cloud-supabase-url-input').value,
    anonKey: document.getElementById('cloud-supabase-key-input').value,
    profileId: document.getElementById('cloud-profile-id-input').value,
  });
  if (!hasCloudConfig()) {
    showStatus('Cloud設定を入力してください', 5000, 'error');
    return;
  }
  const btn = document.getElementById('cloud-sync-now-btn');
  btn.disabled = true;
  btn.textContent = '同期中...';
  try {
    await loadCloudState();
    await pushCloudState('manual');
  } catch (err) {
    showStatus(`同期失敗: ${err.message}`, 9000, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '同期';
  }
});
document.getElementById('settings-theme-toggle-btn').addEventListener('click', toggleTheme);

// Keyboard shortcuts
function isShortcutOverlayOpen() {
  return document.getElementById('settings-overlay')?.style.display !== 'none'
    || document.getElementById('tile-overlay')?.classList.contains('open')
    || document.getElementById('image-lightbox')?.classList.contains('open')
    || document.body.classList.contains('mobile-detail-open');
}

document.addEventListener('keydown', e => {
  const ae = document.activeElement;
  if (['INPUT', 'TEXTAREA'].includes(ae.tagName) || ae.isContentEditable) return;
  const overlayOpen = isShortcutOverlayOpen();
  if (overlayOpen && !['Escape', 'ArrowLeft', 'ArrowRight'].includes(e.key)) return;
  const sorted = visibleSites();
  const currentSortedIdx = sorted.findIndex(s => sites.indexOf(s) === selectedIndex);

  switch (e.key) {
    case 'j': {
      const nextIdx = Math.min(currentSortedIdx + 1, sorted.length - 1);
      const next = sorted[nextIdx];
      if (next) selectSite(sites.indexOf(next));
      break;
    }
    case 'k': {
      const prevIdx = Math.max(currentSortedIdx - 1, 0);
      const prev = sorted[prevIdx];
      if (prev) selectSite(sites.indexOf(prev));
      break;
    }
    case 'o':
      if (selectedIndex >= 0) window.open(sites[selectedIndex].url, '_blank', 'noopener');
      break;
    case 'r':
      checkAll();
      break;
    case 't':
      document.getElementById('view-toggle-btn').click();
      break;
    case 'p':
      document.getElementById('pin-filter-btn').click();
      break;
    case 'e':
      document.getElementById('expand-all-btn').click();
      break;
    case 'i':
      document.getElementById('image-mode-btn').click();
      break;
    case 'Escape':
      if (document.getElementById('image-lightbox').classList.contains('open')) {
        closeLightbox();
      } else if (document.body.classList.contains('mobile-detail-open')) {
        closeMobileDetail();
      }
      break;
    case 'ArrowLeft':
      if (document.getElementById('image-lightbox').classList.contains('open')) {
        document.getElementById('image-lightbox-prev').click();
      }
      break;
    case 'ArrowRight':
      if (document.getElementById('image-lightbox').classList.contains('open')) {
        document.getElementById('image-lightbox-next').click();
      }
      break;
  }
});

// Resizer
(function () {
  const resizer = document.getElementById('resizer');
  const panel = document.getElementById('site-list-panel');
  let startX, startWidth;
  resizer.addEventListener('mousedown', e => {
    startX = e.clientX;
    startWidth = panel.offsetWidth;
    resizer.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  function onMove(e) {
    panel.style.width = Math.max(160, Math.min(560, startWidth + e.clientX - startX)) + 'px';
  }
  function onUp() {
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
})();

    document.getElementById('image-mode-btn').classList.add('active');
  }
})();

  if (isMobileViewport() && viewMode === 'tile') {
    viewMode = 'list';
    document.getElementById('main').classList.remove('tile-mode');
    document.getElementById('view-toggle-btn').classList.remove('active');
    document.getElementById('tile-overlay').classList.remove('open');

  } else if (selectedIndex >= 0 && !document.body.classList.contains('mobile-detail-open')) {
    showDetail();
  }
});
